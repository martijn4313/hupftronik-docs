# Project Information
site_name: Hüpftronik Documentation
site_description: Open-source hardware solutions for automotive and motorcycle projects.
site_author: Hüpftronik
site_url: https://martijn4313.github.io/hupftronik-docs/
use_directory_urls: true

# Theme Configuration
theme:
  name: material
  palette:
    scheme: slate
    primary: black
    accent: deep orange
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.suggest
    - search.highlight


extra_css:
  - stylesheets/extra.css
  
extra_javascript:
  - javascripts/mathjax-config.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  # Include system: pull reusable blocks (status badges, shared warnings,
  # product-specific notes) from includes/ with the --8<-- "file.md" syntax.
  - pymdownx.snippets:
      base_path: [includes]
      check_paths: true
  - attr_list
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true

