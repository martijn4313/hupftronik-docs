<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thermal Simulator</title>
    <style>
        /* iFrame Base Resets */
        html, body {
            margin: 0;
            padding: 0;
            background: transparent; /* Allows MkDocs background to show if iframe allows it */
            color-scheme: dark; /* Tells browser to use dark defaults (prevents white flashes) */
        }
        body {
            padding: 10px; /* Small padding inside the iframe boundary */
        }

        .ht-sim-container {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #0f172a; /* Forced solid dark background */
            border: 1px solid #334155; /* Dark slate border */
            border-radius: 12px;
            padding: 24px;
            max-width: 650px;
            margin: 20px auto;
            color: #e2e8f0; /* Light text */
        }
        .ht-sim-header {
            margin-bottom: 20px;
            border-bottom: 1px solid #334155;
            padding-bottom: 12px;
        }
        .ht-sim-header h3 { margin: 0 0 8px 0; color: #f8fafc; }
        .ht-sim-header p { margin: 0; color: #94a3b8; font-size: 0.9em; }
        .ht-sim-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }
        .ht-sim-control {
            display: flex;
            flex-direction: column;
        }
        .ht-sim-control label {
            font-size: 0.85em;
            font-weight: 600;
            color: #cbd5e1;
            margin-bottom: 6px;
        }
        .ht-sim-control select,
        .ht-sim-control input[type="range"] {
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #475569;
            font-size: 0.9em;
            background: #1e293b; /* Dark input background */
            color: #f8fafc;
        }
        .ht-sim-control input[type="range"] {
            accent-color: #3b82f6; /* Modern blue slider */
        }
        .ht-sim-radio-group {
            display: flex;
            gap: 12px;
        }
        .ht-sim-radio-group label {
            font-weight: 400;
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            font-size: 0.9em;
            color: #e2e8f0;
        }
        .ht-sim-value {
            font-weight: bold;
            color: #f8fafc;
            float: right;
        }
        .ht-sim-results {
            background: #1e293b; /* Forced solid dark inner box */
            padding: 16px;
            border-radius: 8px;
            border: 1px solid #334155;
        }
        .ht-sim-bar-container {
            margin-bottom: 16px;
        }
        .ht-sim-bar-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
            font-size: 0.9em;
            font-weight: 600;
            color: #e2e8f0;
        }
        .ht-sim-bar-bg {
            background: #334155; /* Darker track for the bar */
            height: 24px;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }
        .ht-sim-bar-fill {
            height: 100%;
            transition: width 0.3s ease, background-color 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 8px;
            color: white;
            font-size: 0.8em;
            font-weight: bold;
            text-shadow: 0 1px 2px rgba(0,0,0,0.6);
        }
        .ht-sim-alert {
            color: #f87171; /* Brighter red for dark mode */
            font-size: 0.8em;
            font-weight: 700;
            margin-top: 6px;
            display: none;
        }
        @media (max-width: 500px) {
            .ht-sim-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="ht-sim-container">
    <div class="ht-sim-header">
        <h3>Thermal Simulator</h3>
        <p>Injector Driver Architecture: IRLR2905 vs. NCE6005</p>
    </div>

    <div class="ht-sim-grid">
        <div class="ht-sim-control">
            <label>Injectors Driven (Parallel)</label>
            <div class="ht-sim-radio-group">
                <label><input type="radio" name="injCount" value="1" onchange="htCalc()"> 1</label>
                <label><input type="radio" name="injCount" value="2" onchange="htCalc()"> 2</label>
                <label><input type="radio" name="injCount" value="3" onchange="htCalc()"> 3</label>
                <label><input type="radio" name="injCount" value="4" checked onchange="htCalc()"> 4</label>
            </div>
        </div>

        <div class="ht-sim-control">
            <label>Average RPM <span class="ht-sim-value" id="valRPM">6000</span></label>
            <input type="range" id="inpRPM" min="1000" max="8000" step="100" value="6000" oninput="htCalc()">
        </div>

        <div class="ht-sim-control">
            <label>Ambient Temp (°C) <span class="ht-sim-value" id="valAmb">50</span></label>
            <input type="range" id="inpAmb" min="20" max="120" step="1" value="50" oninput="htCalc()">
        </div>

        <div class="ht-sim-control">
            <label>IRLR2905 PCB Coupling</label>
            <select id="inpRthIRLR" onchange="htCalc()">
                <option value="50">Without heat coupling (50 °C/W)</option>
                <option value="15">Simple Alu Plate 80x100mm (15 °C/W)</option>
                <option value="8.36" selected>Coupling to Cast Alu Case (8.36 °C/W)</option>
            </select>
        </div>
        
        <div class="ht-sim-control" style="grid-column: 1 / -1;">
            <label>NCE6005 Heatsink (No pad on SOP-8)</label>
            <select id="inpRthNCE" onchange="htCalc()">
                <option value="62.5" selected>Bare SOP-8 Package (62.5 °C/W)</option>
                <option value="35">Add Glue-on Heatsink (35 °C/W)</option>
            </select>
        </div>
    </div>

    <div class="ht-sim-results">
        <div class="ht-sim-bar-container">
            <div class="ht-sim-bar-label">
                <span>IRLR2905 (D-PAK)</span>
                <span id="txtIRLR">82.4 °C</span>
            </div>
            <div class="ht-sim-bar-bg">
                <div class="ht-sim-bar-fill" id="barIRLR" style="width: 50%; background-color: #10b981;"></div>
            </div>
            <div class="ht-sim-alert" id="warnIRLR">⚠️ Exceeds 175°C Max Junction Temp!</div>
        </div>

        <div class="ht-sim-bar-container" style="margin-bottom: 0;">
            <div class="ht-sim-bar-label">
                <span>NCE6005 (SOP-8)</span>
                <span id="txtNCE">287.0 °C</span>
            </div>
            <div class="ht-sim-bar-bg">
                <div class="ht-sim-bar-fill" id="barNCE" style="width: 100%; background-color: #ef4444;"></div>
            </div>
            <div class="ht-sim-alert" id="warnNCE">⚠️ Exceeds 150°C Max Junction Temp (Thermal Failure)!</div>
        </div>
    </div>

    <script>
        function htCalc() {
            // Hardware constants
            const voltage = 14;
            const injResBase = 12; // ohms per injector
            const rdsIRLR = 0.035; // 35 mOhm
            const rdsNCE = 0.030;  // 30 mOhm typical max for NCE6005AS @ 10V
            const baseClamp = 0.008175; // Joules per injector per dump
            const duty = 0.80;     // Max duty cycle assumed
            const maxTempIRLR = 175; // Absolute max silicon temp
            const maxTempNCE = 150;  // Absolute max silicon temp

            // Fetch UI inputs
            const injCount = parseInt(document.querySelector('input[name="injCount"]:checked').value);
            const rpm = parseInt(document.getElementById('inpRPM').value);
            const amb = parseInt(document.getElementById('inpAmb').value);
            const rthIRLR = parseFloat(document.getElementById('inpRthIRLR').value);
            const rthNCE = parseFloat(document.getElementById('inpRthNCE').value);

            // Update visible labels
            document.getElementById('valRPM').innerText = rpm;
            document.getElementById('valAmb').innerText = amb;

            // Physics computations
            const iPeak = voltage / (injResBase / injCount);
            
            // Conduction losses
            const pCondIRLR = (iPeak * iPeak) * rdsIRLR * duty;
            const pCondNCE = (iPeak * iPeak) * rdsNCE * duty;
            
            // Inductive clamping losses
            const freq = rpm / 60; // Convert RPM to Hz
            const pInd = (baseClamp * injCount) * freq;

            const pTotIRLR = pCondIRLR + pInd;
            const pTotNCE = pCondNCE + pInd;

            // Final junction temperatures
            const tjIRLR = amb + (pTotIRLR * rthIRLR);
            const tjNCE = amb + (pTotNCE * rthNCE);

            // Render updates
            updateBar('IRLR', tjIRLR, maxTempIRLR);
            updateBar('NCE', tjNCE, maxTempNCE);
        }

        function updateBar(id, temp, maxTemp) {
            const bar = document.getElementById('bar' + id);
            const txt = document.getElementById('txt' + id);
            const warn = document.getElementById('warn' + id);
            
            txt.innerText = temp.toFixed(1) + ' °C';
            
            // Visually scale the bar width (20C = 0%, MaxTemp = 90% so overages clip nicely at 100%)
            let pct = ((temp - 20) / (maxTemp - 20)) * 90;
            if (pct < 0) pct = 0;
            if (pct > 100) pct = 100;
            
            bar.style.width = pct + '%';

            // Color coding and warnings based on spec limits
            if (temp >= maxTemp) {
                bar.style.backgroundColor = '#ef4444'; // Red
                warn.style.display = 'block';
            } else if (temp >= maxTemp * 0.8) {
                bar.style.backgroundColor = '#f59e0b'; // Orange
                warn.style.display = 'none';
            } else {
                bar.style.backgroundColor = '#10b981'; // Green
                warn.style.display = 'none';
            }
        }

        // Initialize on load
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', htCalc);
        } else {
            htCalc();
        }
    </script>
</div>

</body>
</html>
